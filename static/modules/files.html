<div style="display:flex; flex-direction:column; height:100%; min-height:0; position:relative;">
    <div class="section-header module-toolbar-tight" style="flex-shrink:0;">
        <h3>Remote File Browser</h3>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <select class="form-input" id="rfm-client" style="width:240px; max-width:100%; height:32px; font-size:11px;" onchange="rfmOnClientChange()">
                <option value="">SELECT_TARGET...</option>
            </select>
            <span id="rfm-status" style="font-family:'JetBrains Mono'; font-size:10px; color:#666;">NO_TARGET</span>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="rfm-toolbar" style="display:none; gap:10px; align-items:center; margin-bottom:15px; flex-wrap:wrap; flex-shrink:0;">
        <div style="flex:1; display:flex; align-items:center; gap:8px; min-width:300px;">
            <button class="btn-primary" style="padding:6px 12px; font-size:11px;" onclick="rfmGoUp()" title="Up">
                <i class="fas fa-level-up-alt"></i>
            </button>
            <button class="btn-primary" style="padding:6px 12px; font-size:11px;" onclick="rfmGoToDrives()" title="Drives / Root">
                <i class="fas fa-hdd"></i>
            </button>
            <input type="text" class="form-input" id="rfm-path-input" placeholder="Enter path..." style="flex:1; height:30px; font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--accent); min-width:100px;" onkeydown="if(event.key==='Enter')rfmGoToPath()">
            <button class="btn-primary" style="padding:6px 12px; font-size:11px;" onclick="rfmGoToPath()" title="Go">
                <i class="fas fa-arrow-right"></i> GO
            </button>
            <button class="btn-primary" style="padding:6px 12px; font-size:11px;" onclick="rfmRefresh()" title="Refresh">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
        <div style="display:flex; gap:8px; flex-shrink:0;">
            <button class="btn-primary" style="padding:6px 12px; font-size:11px;" onclick="rfmShowMkdir()">
                <i class="fas fa-folder-plus"></i> MKDIR
            </button>
            <label class="btn-primary" style="padding:6px 12px; font-size:11px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; margin:0;">
                <i class="fas fa-cloud-upload-alt"></i> UPLOAD
                <input type="file" id="rfm-upload-input" style="display:none;" onchange="rfmUploadFiles(this.files)">
            </label>
        </div>
    </div>

    <!-- Mkdir dialog -->
    <div id="rfm-mkdir-dialog" style="display:none; margin-bottom:15px; padding:12px; background:rgba(26,26,26,0.6); border:1px solid var(--border); flex-shrink:0;">
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="text" class="form-input" id="rfm-mkdir-name" placeholder="New folder name" style="flex:1; height:32px; font-size:12px;">
            <button class="btn-primary" style="padding:6px 14px; font-size:11px;" onclick="rfmCreateDir()">CREATE</button>
            <button class="btn-primary" style="padding:6px 14px; font-size:11px; opacity:0.5;" onclick="document.getElementById('rfm-mkdir-dialog').style.display='none'">CANCEL</button>
        </div>
    </div>

    <!-- Progress area -->
    <div id="rfm-progress" style="display:none; margin-bottom:15px; flex-shrink:0;"></div>

    <!-- Main area: file list + inline editor side by side -->
    <div style="display:flex; flex:1; min-height:0; gap:0;">

        <!-- File listing panel -->
        <div id="rfm-list-panel" style="display:flex; flex-direction:column; min-height:0; flex:1; min-width:0; transition:flex 0.2s;">
            <div id="rfm-list-wrapper" style="display:none; flex:1; min-height:0;">
                <div class="list-container" style="height:100%; display:flex; flex-direction:column; overflow-x:auto;">
                    <div class="beacons-header-bar" style="grid-template-columns: 40px 1fr 100px 140px 120px; min-width:500px; flex-shrink:0;">
                        <span></span>
                        <span>Name</span>
                        <span>Size</span>
                        <span>Modified</span>
                        <span style="text-align:right;">Actions</span>
                    </div>
                    <div id="rfm-file-list" style="flex:1; overflow-y:auto; min-height:0;">
                        <div style="padding:30px; text-align:center; opacity:0.3; font-family:'JetBrains Mono';">SELECT_TARGET_FIRST</div>
                    </div>
                </div>
            </div>

            <!-- No target placeholder -->
            <div id="rfm-placeholder" style="display:flex; flex:1; align-items:center; justify-content:center; min-height:200px;">
                <div style="text-align:center; opacity:0.3;">
                    <i class="fas fa-crosshairs" style="font-size:48px; color:var(--accent); margin-bottom:15px;"></i>
                    <div style="font-family:'JetBrains Mono'; font-size:13px;">SELECT_TARGET_TO_BROWSE_FILES</div>
                </div>
            </div>
        </div>

        <!-- Inline Editor panel (hidden by default, slides in from right) -->
        <div id="rfm-editor-panel" style="display:none; flex-direction:column; width:60%; min-width:400px; max-width:75%; border-left:2px solid var(--accent); background:#1e1e1e; min-height:0; flex-shrink:0;">
            <!-- Editor header -->
            <div style="padding:6px 12px; background:#252526; border-bottom:1px solid #3c3c3c; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; min-height:40px;">
                <div style="display:flex; align-items:center; gap:10px; overflow:hidden; flex:1; min-width:0;">
                    <i class="fas fa-code" style="color:var(--accent); font-size:11px; flex-shrink:0;"></i>
                    <span id="rfm-editor-filename" style="font-family:'JetBrains Mono'; color:var(--accent); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">EDITING_FILE</span>
                    <div id="rfm-editor-stats" style="font-family:'JetBrains Mono'; font-size:9px; color:#555; display:flex; gap:8px; flex-shrink:0;">
                        <span id="rfm-editor-word-count">Words: 0</span>
                        <span id="rfm-editor-newline">LF</span>
                        <span id="rfm-editor-sha" style="opacity:0.5;">SHA: -</span>
                    </div>
                </div>
                <div style="display:flex; gap:6px; flex-shrink:0; margin-left:8px;">
                    <button class="btn-primary" style="padding:3px 12px; font-size:11px;" onclick="rfmSaveFile()" title="Ctrl+S">
                        <i class="fas fa-save"></i> SAVE
                    </button>
                    <button class="btn-primary" style="padding:3px 10px; font-size:11px; background:#3a3a3a;" onclick="rfmCloseEditor()" title="Close editor">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            <!-- Monaco container -->
            <div id="rfm-monaco-container" style="flex:1; width:100%; min-height:0; position:relative;"></div>
        </div>

    </div>
</div>

<script>
(function() {
    let currentClientId = '';
    let currentPath = '.';
    const escapeHtml = window.PRTS.escapeHtml;
    const fileListColumns = 'grid-template-columns: 40px 1fr 100px 140px 120px; padding:8px 20px; min-width:500px;';

    function formatSize(bytes) {
        if (!bytes || bytes === 0) return '-';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    function formatTime(t) {
        if (!t) return '-';
        return new Date(t).toLocaleString();
    }

    function getCurrentSeparator(path) {
        return path.includes('\\') ? '\\' : '/';
    }

    function joinPath(basePath, name) {
        const sep = getCurrentSeparator(basePath);
        let fullPath = basePath || '.';
        if (!fullPath.endsWith(sep) && !fullPath.endsWith('/')) fullPath += sep;
        return fullPath + name;
    }

    function getParentPath(path) {
        if (!path || path === '__DRIVES__') return '__DRIVES__';

        let parent = path;
        const sep = getCurrentSeparator(parent);
        if (parent.endsWith(sep) && parent.length > 1) parent = parent.slice(0, -1);

        if (/^[A-Za-z]:$/.test(parent) || /^[A-Za-z]:\\$/.test(parent)) {
            return '__DRIVES__';
        }
        if (parent === '/') {
            return '/';
        }

        const lastSep = parent.lastIndexOf(sep);
        if (lastSep > 0) {
            parent = parent.substring(0, lastSep);
            if (/^[A-Za-z]:$/.test(parent)) parent += '\\';
            return parent;
        }
        if (lastSep === 0) {
            return '/';
        }
        return '.';
    }

    function toInlinePath(path) {
        return String(path == null ? '' : path)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'");
    }

    function setListMessage(html) {
        const container = document.getElementById('rfm-file-list');
        if (container) container.innerHTML = html;
    }

    function setStatusIndicator(label, color) {
        const statusEl = document.getElementById('rfm-status');
        if (!statusEl) return;
        statusEl.textContent = label;
        statusEl.style.color = color;
    }

    function toggleTargetState(hasTarget) {
        const toolbar = document.getElementById('rfm-toolbar');
        const listWrapper = document.getElementById('rfm-list-wrapper');
        const placeholder = document.getElementById('rfm-placeholder');
        if (!toolbar || !listWrapper || !placeholder) return;
        toolbar.style.display = hasTarget ? 'flex' : 'none';
        // rfm-list-wrapper is now inside rfm-list-panel, use flex to fill
        listWrapper.style.display = hasTarget ? 'flex' : 'none';
        listWrapper.style.flexDirection = 'column';
        placeholder.style.display = hasTarget ? 'none' : 'flex';
    }

    function ensureProgressArea() {
        const progressArea = document.getElementById('rfm-progress');
        if (progressArea) progressArea.style.display = 'block';
        return progressArea;
    }

    function createProgressCard(prefix, iconClass, label, statusText, barColor, metaText) {
        const progressArea = ensureProgressArea();
        const progId = prefix + '_' + Date.now();
        const progEl = document.createElement('div');
        progEl.className = 'module-progress-card';
        progEl.innerHTML =
            '<div class="module-progress-head">' +
                '<span class="module-progress-title"><i class="fas ' + iconClass + '" style="margin-right:6px;"></i>' + escapeHtml(label) + '</span>' +
                '<span class="module-progress-status" id="' + progId + '-status">' + statusText + '</span>' +
            '</div>' +
            '<div class="module-progress-bar-wrap"><div id="' + progId + '-bar" class="module-progress-bar" style="background:' + barColor + '; box-shadow:0 0 8px ' + barColor + ';"></div></div>' +
            (metaText ? '<div class="module-progress-meta">' + metaText + '</div>' : '');
        if (progressArea) progressArea.appendChild(progEl);
        return {
            root: progEl,
            statusEl: document.getElementById(progId + '-status'),
            barEl: document.getElementById(progId + '-bar')
        };
    }

    function removeProgressCard(card, delayMs) {
        setTimeout(function() {
            if (card && card.root && card.root.parentNode) {
                card.root.parentNode.removeChild(card.root);
            }
        }, delayMs || 0);
    }

    function renderActionCell(item, safePath) {
        let html = '<span style="text-align:right; display:flex; gap:10px; justify-content:flex-end; font-size:11px;">';
        if (!item.is_dir) {
            if (isTextFile(item.name)) {
                html += '<span style="color:var(--accent); cursor:pointer;" onclick="rfmEditFile(\'' + safePath + '\')" title="Edit"><i class="fas fa-edit"></i></span>';
            }
            html += '<span style="color:var(--accent); cursor:pointer;" onclick="rfmDownloadFile(\'' + safePath + '\',' + (item.size || 0) + ')" title="Download"><i class="fas fa-download"></i></span>';
        }
        html += '<span style="color:#ff3b30; cursor:pointer;" onclick="rfmDeleteItem(\'' + safePath + '\')" title="Delete"><i class="fas fa-trash"></i></span>';
        html += '</span>';
        return html;
    }

    function isTextFile(name) {
        const ext = '.' + name.split('.').pop().toLowerCase();
        const textExts = ['.txt', '.php', '.js', '.py', '.html', '.css', '.json', '.sh', '.ps1', '.go', '.bat', '.ini', '.conf', '.cfg', '.yaml', '.yml', '.md', '.log', '.xml', '.c', '.cpp', '.h', '.hpp', '.java', '.rs', '.toml', '.env', '.sql', '.csv', '.tsv', '.properties', '.ts', '.jsx', '.tsx', '.vue', '.rb', '.pl', '.lua', '.r', '.swift', '.kt', '.scala', '.gradle', '.tf', '.hcl', '.proto'];
        return textExts.includes(ext);
    }

    function getFileIcon(name, isDir) {
        if (isDir) return 'fa-folder" style="color:#f5a623;';
        const ext = name.split('.').pop().toLowerCase();
        const icons = {
            'exe': 'fa-cog" style="color:#ff3b30;', 'elf': 'fa-cog" style="color:#ff3b30;',
            'dll': 'fa-puzzle-piece" style="color:#ff9800;', 'so': 'fa-puzzle-piece" style="color:#ff9800;',
            'ps1': 'fa-terminal" style="color:#0078d4;', 'py': 'fa-code" style="color:#3572A5;',
            'sh': 'fa-scroll" style="color:#4EAA25;', 'bat': 'fa-terminal" style="color:#888;',
            'bin': 'fa-microchip" style="color:#9c27b0;', 'raw': 'fa-file-code" style="color:#9c27b0;',
            'zip': 'fa-file-archive" style="color:#ff9800;', 'tar': 'fa-file-archive" style="color:#ff9800;',
            'gz': 'fa-file-archive" style="color:#ff9800;', '7z': 'fa-file-archive" style="color:#ff9800;',
            'rar': 'fa-file-archive" style="color:#ff9800;',
            'txt': 'fa-file-alt" style="color:#888;', 'log': 'fa-file-alt" style="color:#888;',
            'json': 'fa-file-code" style="color:#888;', 'xml': 'fa-file-code" style="color:#888;',
            'png': 'fa-file-image" style="color:#2196F3;', 'jpg': 'fa-file-image" style="color:#2196F3;',
            'jpeg': 'fa-file-image" style="color:#2196F3;', 'gif': 'fa-file-image" style="color:#2196F3;',
            'svg': 'fa-file-image" style="color:#2196F3;', 'ico': 'fa-file-image" style="color:#2196F3;',
            'pdf': 'fa-file-pdf" style="color:#ff3b30;',
            'doc': 'fa-file-word" style="color:#2b579a;', 'docx': 'fa-file-word" style="color:#2b579a;',
            'xls': 'fa-file-excel" style="color:#217346;', 'xlsx': 'fa-file-excel" style="color:#217346;',
            'ppt': 'fa-file-powerpoint" style="color:#d24726;', 'pptx': 'fa-file-powerpoint" style="color:#d24726;',
            'db': 'fa-database" style="color:#888;', 'sqlite': 'fa-database" style="color:#888;', 'sql': 'fa-database" style="color:#888;',
            'key': 'fa-key" style="color:#f5a623;', 'pem': 'fa-key" style="color:#f5a623;', 'crt': 'fa-key" style="color:#f5a623;',
            'conf': 'fa-cogs" style="color:#888;', 'cfg': 'fa-cogs" style="color:#888;',
            'ini': 'fa-cogs" style="color:#888;', 'toml': 'fa-cogs" style="color:#888;', 'env': 'fa-cogs" style="color:#888;',
            'js': 'fa-code" style="color:#f7df1e;', 'ts': 'fa-code" style="color:#3178c6;',
            'jsx': 'fa-code" style="color:#61dafb;', 'tsx': 'fa-code" style="color:#3178c6;',
            'html': 'fa-code" style="color:#e34c26;', 'css': 'fa-code" style="color:#563d7c;',
            'go': 'fa-code" style="color:#00ADD8;', 'rs': 'fa-code" style="color:#dea584;',
            'java': 'fa-code" style="color:#b07219;', 'c': 'fa-code" style="color:#555555;',
            'cpp': 'fa-code" style="color:#f34b7d;', 'h': 'fa-code" style="color:#555555;',
            'rb': 'fa-code" style="color:#701516;', 'php': 'fa-code" style="color:#4F5D95;',
            'swift': 'fa-code" style="color:#ffac45;', 'kt': 'fa-code" style="color:#A97BFF;',
            'yaml': 'fa-file-code" style="color:#888;', 'yml': 'fa-file-code" style="color:#888;',
            'md': 'fa-file-alt" style="color:#888;',
            'csv': 'fa-file-csv" style="color:#217346;',
        };
        return icons[ext] || 'fa-file" style="color:#666;';
    }

    // Load online clients
    async function loadClients() {
        try {
            const apiResp = await PRTS.api.get('/api/clients');
            const result = apiResp.result;
            const sel = document.getElementById('rfm-client');
            if (!sel || !result.data) return;
            const clients = result.data;
            sel.innerHTML = '<option value="">SELECT_TARGET...</option>' +
                clients.map(c => {
                    const status = c.status === 'online' ? '\u25CF' : '\u25CB';
                    return '<option value="' + c.id + '" data-status="' + c.status + '">' +
                        status + ' ' + (c.hostname || c.id.substring(0, 8)) +
                        ' (' + c.ip + ') [' + (c.os || '?') + ']</option>';
                }).join('');
        } catch(e) { console.error(e); }
    }

    window.rfmOnClientChange = function() {
        const sel = document.getElementById('rfm-client');
        currentClientId = sel.value;

        if (!currentClientId) {
            setStatusIndicator('NO_TARGET', '#666');
            toggleTargetState(false);
            return;
        }

        const opt = sel.selectedOptions[0];
        const isOnline = opt && opt.getAttribute('data-status') === 'online';
        setStatusIndicator(isOnline ? 'TARGET_ONLINE' : 'TARGET_OFFLINE', isOnline ? '#4caf50' : '#ff3b30');
        toggleTargetState(true);

        currentPath = '.';
        rfmNavigate(currentPath);
    };

    function updatePathInput(path) {
        const input = document.getElementById('rfm-path-input');
        if (input) input.value = path;
    }

    window.rfmNavigate = async function(path) {
        if (!currentClientId) return;
        currentPath = path || '.';

        setListMessage('<div style="padding:30px; text-align:center; opacity:0.5; font-family:\'JetBrains Mono\'; font-size:11px;"><i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>QUERYING_TARGET...</div>');

        try {
            const apiResp = await PRTS.api.get(PRTS.apiUrl('/api/rfm/list', { client_id: currentClientId, path: currentPath }));
            const result = apiResp.result;
            if (result.status !== 'success') {
                setListMessage('<div style="padding:30px; text-align:center; color:#ff3b30; font-family:\'JetBrains Mono\'; font-size:11px;">ERROR: ' + (result.message || 'unknown') + '</div>');
                return;
            }

            currentPath = result.data.path || currentPath;
            updatePathInput(currentPath);

            if (currentPath === '__DRIVES__') {
                renderDriveList(result.data.items || []);
            } else {
                renderFileList(result.data.items || []);
            }
        } catch(e) {
            setListMessage('<div style="padding:30px; text-align:center; color:#ff3b30; font-family:\'JetBrains Mono\'; font-size:11px;">ERROR: ' + e.message + '</div>');
        }
    };

    window.rfmGoUp = function() {
        if (currentPath === '__DRIVES__') return;
        rfmNavigate(getParentPath(currentPath));
    };

    window.rfmGoToDrives = function() {
        rfmNavigate('__DRIVES__');
    };

    window.rfmGoToPath = function() {
        const input = document.getElementById('rfm-path-input');
        const path = input.value.trim();
        if (!path) return;
        rfmNavigate(path);
    };

    window.rfmRefresh = function() {
        rfmNavigate(currentPath);
    };

    function renderDriveList(items) {
        const container = document.getElementById('rfm-file-list');
        if (!container) return;

        if (items.length === 0) {
            container.innerHTML = '<div class="module-empty-state">NO_DRIVES_FOUND</div>';
            return;
        }

        container.innerHTML = items.map(item => {
            const drivePath = item.name + '\\';
            const safePath = toInlinePath(drivePath);
            return '<div class="beacon-row" style="' + fileListColumns + '">' +
                '<span><i class="fas fa-hdd" style="color:var(--accent);"></i></span>' +
                '<span onclick="rfmNavigate(\'' + safePath + '\')" style="cursor:pointer; color:var(--accent); font-family:\'JetBrains Mono\'; font-size:13px; font-weight:bold;">' + escapeHtml(item.name) + ':\\</span>' +
                '<span style="font-size:11px; color:#888; font-family:\'JetBrains Mono\';">Drive</span>' +
                '<span style="font-size:10px; color:#666;">-</span>' +
                '<span></span>' +
            '</div>';
        }).join('');
    }

    function renderFileList(items) {
        const container = document.getElementById('rfm-file-list');
        if (!container) return;

        if (items.length === 0) {
            container.innerHTML = '<div class="module-empty-state">EMPTY_DIRECTORY</div>';
            return;
        }

        items.sort((a, b) => {
            if (a.is_dir && !b.is_dir) return -1;
            if (!a.is_dir && b.is_dir) return 1;
            return a.name.localeCompare(b.name);
        });

        container.innerHTML = items.map(item => {
            const icon = getFileIcon(item.name, item.is_dir);
            const fullPath = joinPath(currentPath, item.name);
            const safePath = toInlinePath(fullPath);

            const nameClick = item.is_dir
                ? 'onclick="rfmNavigate(\'' + safePath + '\')" style="cursor:pointer; color:var(--accent);"'
                : 'style="color:var(--text-main);"';

            return '<div class="beacon-row" style="' + fileListColumns + '">' +
                '<span><i class="fas ' + icon + '"></i></span>' +
                '<span ' + nameClick + '>' + escapeHtml(item.name) + '</span>' +
                '<span style="font-size:11px; color:#888; font-family:\'JetBrains Mono\';">' + (item.is_dir ? '-' : formatSize(item.size)) + '</span>' +
                '<span style="font-size:10px; color:#666;">' + formatTime(item.mod_time) + '</span>' +
                renderActionCell(item, safePath) +
            '</div>';
        }).join('');
    }

    // --- Mkdir ---
    window.rfmShowMkdir = function() {
        document.getElementById('rfm-mkdir-dialog').style.display = 'block';
        document.getElementById('rfm-mkdir-name').value = '';
        document.getElementById('rfm-mkdir-name').focus();
    };

    window.rfmCreateDir = async function() {
        const name = document.getElementById('rfm-mkdir-name').value.trim();
        if (!name || !currentClientId) return;
        const newPath = joinPath(currentPath, name);

        try {
            const apiResp = await PRTS.api.post('/api/rfm/mkdir', { client_id: currentClientId, path: newPath });
            const result = apiResp.result;
            if (result.status === 'success') {
                showNotification('DIRECTORY_CREATED: ' + name);
            } else {
                showNotification('ERROR: ' + result.message);
            }
            document.getElementById('rfm-mkdir-dialog').style.display = 'none';
            rfmRefresh();
        } catch(e) { showNotification('ERROR: ' + e.message); }
    };

    // --- Delete ---
    window.rfmDeleteItem = async function(path) {
        if (!confirm('Delete on remote target: ' + path + '?')) return;
        try {
            const apiResp = await PRTS.api.post('/api/rfm/delete', { client_id: currentClientId, path: path });
            const result = apiResp.result;
            showNotification(result.status === 'success' ? 'DELETED' : ('ERROR: ' + result.message));
            rfmRefresh();
        } catch(e) { showNotification('ERROR: ' + e.message); }
    };

    // --- Download ---
    window.rfmDownloadFile = async function(path, sizeBytes = 0) {
        const fileName = path.split(/[/\\]/).pop();
        const progressCard = createProgressCard('rdl', 'fa-cloud-download-alt', fileName, 'FETCHING_FROM_TARGET...', '#2196F3');

        try {
            const statusEl = progressCard.statusEl;
            const barEl = progressCard.barEl;
            barEl.style.width = '30%';

            const requestUrl = PRTS.apiUrl('/api/rfm/download', { client_id: currentClientId, path: path, size: sizeBytes > 0 ? sizeBytes : '' });
            const apiResp = await PRTS.api.get(requestUrl);
            const result = apiResp.result;

            if (result.status !== 'success') {
                throw new Error(result.message || 'download failed');
            }

            barEl.style.width = '80%';
            statusEl.textContent = 'DECODING...';

            const b64 = result.data.base64;
            const raw = atob(b64);
            const bytes = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            const blob = new Blob([bytes]);
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(blobUrl);

            barEl.style.width = '100%';
            barEl.style.background = 'var(--success)';
            statusEl.textContent = 'COMPLETE (' + formatSize(result.data.size) + ')';
            statusEl.style.color = 'var(--success)';
            showNotification('DOWNLOAD_COMPLETE: ' + fileName);
            removeProgressCard(progressCard, 4000);

        } catch(e) {
            const statusEl = progressCard.statusEl;
            if (statusEl) { statusEl.textContent = 'FAILED: ' + e.message; statusEl.style.color = '#ff3b30'; }
            showNotification('DOWNLOAD_FAILED: ' + e.message);
        }
    };

    // --- Upload ---
    window.rfmUploadFiles = async function(files) {
        if (!files || files.length === 0 || !currentClientId) return;

        for (const file of files) {
            await rfmUploadSingle(file);
        }

        document.getElementById('rfm-upload-input').value = '';
        rfmRefresh();
    };

    async function rfmUploadSingle(file) {
        if (file.size > 50 * 1024 * 1024) {
            showNotification('ERROR: File too large (>50MB): ' + file.name);
            return;
        }

        const progressCard = createProgressCard('rup', 'fa-cloud-upload-alt', file.name, 'ENCODING...', 'var(--accent)', formatSize(file.size));

        try {
            const statusEl = progressCard.statusEl;
            const barEl = progressCard.barEl;

            const b64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            barEl.style.width = '40%';
            statusEl.textContent = 'UPLOADING_TO_TARGET...';

            const destPath = joinPath(currentPath, file.name);

            const apiResp = await PRTS.api.post('/api/rfm/upload', { client_id: currentClientId, path: destPath, data: b64 });
            const result = apiResp.result;

            if (result.status !== 'success') throw new Error(result.message);

            barEl.style.width = '100%';
            barEl.style.background = 'var(--success)';
            statusEl.textContent = 'COMPLETE';
            statusEl.style.color = 'var(--success)';
            showNotification('UPLOAD_COMPLETE: ' + file.name);
            removeProgressCard(progressCard, 4000);

        } catch(e) {
            const statusEl = progressCard.statusEl;
            if (statusEl) { statusEl.textContent = 'FAILED: ' + e.message; statusEl.style.color = '#ff3b30'; }
            showNotification('UPLOAD_FAILED: ' + e.message);
        }
    }

    // Enter key for mkdir
    document.getElementById('rfm-mkdir-name').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') rfmCreateDir();
        if (e.key === 'Escape') document.getElementById('rfm-mkdir-dialog').style.display = 'none';
    });

    // --- Editor Logic ---
    let rfmMonacoEditor = null;
    let rfmCurrentFileSHA = '';
    let rfmCurrentFilePath = '';

    function getMonacoLanguage(name) {
        const ext = name.split('.').pop().toLowerCase();
        const languages = {
            'js': 'javascript', 'ts': 'typescript', 'jsx': 'javascript', 'tsx': 'typescript',
            'py': 'python', 'php': 'php',
            'html': 'html', 'css': 'css', 'json': 'json', 'go': 'go', 'sh': 'shell',
            'ps1': 'powershell', 'bat': 'bat', 'yaml': 'yaml', 'yml': 'yaml',
            'xml': 'xml', 'md': 'markdown', 'sql': 'sql',
            'c': 'c', 'cpp': 'cpp', 'h': 'c', 'hpp': 'cpp',
            'java': 'java', 'rs': 'rust', 'rb': 'ruby', 'lua': 'lua',
            'swift': 'swift', 'kt': 'kotlin', 'scala': 'scala',
            'r': 'r', 'pl': 'perl',
            'ini': 'ini', 'toml': 'ini', 'cfg': 'ini', 'conf': 'ini',
            'dockerfile': 'dockerfile', 'tf': 'hcl',
            'proto': 'protobuf', 'vue': 'html',
        };
        return languages[ext] || 'plaintext';
    }

    window.rfmEditFile = async function(path) {
        rfmCurrentFilePath = path;

        // Show the inline editor panel (right side), shrink file list
        const editorPanel = document.getElementById('rfm-editor-panel');
        const listPanel = document.getElementById('rfm-list-panel');
        if (editorPanel) { editorPanel.style.display = 'flex'; }
        if (listPanel) { listPanel.style.flex = '0 0 40%'; listPanel.style.minWidth = '200px'; }

        document.getElementById('rfm-editor-filename').textContent = 'LOADING: ' + path.split(/[/\\]/).pop();

        try {
            const requestUrl = PRTS.apiUrl('/api/rfm/download', { client_id: currentClientId, path: path });
            const apiResp = await PRTS.api.get(requestUrl);
            const result = apiResp.result;

            if (result.status !== 'success') {
                throw new Error(result.message || 'fetch failed');
            }

            const b64 = result.data.base64;
            const raw = atob(b64);
            const bytes = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            const content = new TextDecoder('utf-8').decode(bytes);

            rfmCurrentFileSHA = result.data.sha256 || '';

            document.getElementById('rfm-editor-filename').textContent = path.split(/[/\\]/).pop();
            document.getElementById('rfm-editor-sha').textContent = 'SHA: ' + (rfmCurrentFileSHA ? rfmCurrentFileSHA.substring(0, 8) + '...' : 'UNKNOWN');

            // Initialize Monaco - always create fresh since we dispose on close
            require(['vs/editor/editor.main'], function() {
                const container = document.getElementById('rfm-monaco-container');
                if (!container) return;
                container.innerHTML = '';

                rfmMonacoEditor = monaco.editor.create(container, {
                    value: content,
                    language: getMonacoLanguage(path),
                    theme: 'vs-dark',
                    automaticLayout: true,
                    fontSize: 13,
                    fontFamily: 'JetBrains Mono',
                    minimap: { enabled: false },
                    scrollBeyondLastLine: false,
                    renderWhitespace: 'selection',
                    insertSpaces: true,
                    tabSize: 4,
                    detectIndentation: true,
                    wordWrap: 'off',
                });

                rfmMonacoEditor.onDidChangeModelContent(() => {
                    updateRfmEditorStats();
                });

                rfmMonacoEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
                    rfmSaveFile();
                });

                updateRfmEditorStats();
                setTimeout(function() { rfmMonacoEditor.layout(); }, 80);
            });

        } catch(e) {
            showNotification('ERROR: ' + e.message);
            rfmCloseEditor();
        }
    };

    function updateRfmEditorStats() {
        if (!rfmMonacoEditor) return;
        const text = rfmMonacoEditor.getValue();
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        const chars = text.length;
        document.getElementById('rfm-editor-word-count').textContent = `Words: ${words} | Chars: ${chars}`;
        
        const model = rfmMonacoEditor.getModel();
        const eol = model.getEOL();
        document.getElementById('rfm-editor-newline').textContent = eol === '\n' ? 'LF' : 'CRLF';
    }

    window.rfmSaveFile = async function() {
        if (!rfmMonacoEditor) return;
        const content = rfmMonacoEditor.getValue();
        
        try {
            const apiResp = await PRTS.api.post('/api/rfm/edit', {
                client_id: currentClientId,
                path: rfmCurrentFilePath,
                content: content,
                original_sha256: rfmCurrentFileSHA
            });
            
            const result = apiResp.result;
            if (result.status === 'success') {
                showNotification('FILE_SAVED_SUCCESSFULLY');
                rfmCurrentFileSHA = result.data.new_sha256;
                document.getElementById('rfm-editor-sha').textContent = 'SHA: ' + rfmCurrentFileSHA.substring(0, 8) + '...';
                rfmRefresh();
            } else {
                if (result.message.includes('CONFLICT')) {
                    if (confirm('CONFLICT: File was modified by someone else. Overwrite?')) {
                        if (result.data && result.data.current_sha256) {
                            rfmCurrentFileSHA = result.data.current_sha256;
                            rfmSaveFile();
                        }
                    }
                } else {
                    showNotification('ERROR: ' + result.message);
                }
            }
        } catch(e) { showNotification('ERROR: ' + e.message); }
    };

    window.rfmCloseEditor = function() {
        // Hide the inline editor panel and restore full-width file list
        const editorPanel = document.getElementById('rfm-editor-panel');
        const listPanel = document.getElementById('rfm-list-panel');
        if (editorPanel) editorPanel.style.display = 'none';
        if (listPanel) { listPanel.style.flex = '1'; listPanel.style.minWidth = '0'; }

        // Dispose the editor instance to free memory and avoid stale state
        if (rfmMonacoEditor) {
            rfmMonacoEditor.dispose();
            rfmMonacoEditor = null;
        }
        const container = document.getElementById('rfm-monaco-container');
        if (container) container.innerHTML = '';
    };

    // ESC key closes the editor
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const panel = document.getElementById('rfm-editor-panel');
            if (panel && panel.style.display !== 'none') rfmCloseEditor();
        }
    });

    // Init
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
    loadClients();
})();
</script>
